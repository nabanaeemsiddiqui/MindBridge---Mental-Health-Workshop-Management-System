<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Workshops</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f0ff;
        }

        .title{
            text-align:center;
            margin-top:40px;
            margin-bottom:40px;
            color:#5b3cc4;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1 class="title">
            My Enrolled Workshops
        </h1>

        <div class="row">

            {% for enrollment in enrollments %}

            <div class="col-md-4 mb-4">

                <div class="card shadow-sm h-100">

                    <div class="card-body">

                        <h4>
                            {{ enrollment.workshop.title }}
                        </h4>

                        <p>
                            <strong>Speaker:</strong>
                            {{ enrollment.workshop.speaker }}
                        </p>

                        <p>
                            <strong>Date:</strong>
                            {{ enrollment.workshop.date }}
                        </p>

                        <p>
                            {{ enrollment.workshop.description }}
                        </p>

                        <a href="/feedback/{{ enrollment.workshop.id }}/"
                            class="btn btn-warning w-100">

                            Give Feedback

                        </a>

                    </div>

                </div>

            </div>

            {% empty %}

            <h4 class="text-center">
                You have not enrolled in any workshops yet.
            </h4>

            {% endfor %}

        </div>

    </div>

</body>
</html>
