<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f0ff;
        }

        .feedback-box{
            width:500px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.1);
        }

        h2{
            color:#5b3cc4;
            margin-bottom:30px;
            text-align:center;
        }

    </style>
</head>

<body>

    <div class="feedback-box">

        <h2>
            Feedback for {{ workshop.title }}
        </h2>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit"
                    class="btn btn-primary w-100">

                Submit Feedback

            </button>

        </form>

    </div>

</body>
</html>
